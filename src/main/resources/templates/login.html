<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f3f4f6;
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container" style="max-width: 400px;">
    <div class="card shadow-sm border-0 rounded-3 p-4">
        <div class="card-body">
            <h1 class="fs-4 fw-bold text-dark mb-1">로그인</h1>
            <p class="text-muted small mb-4">이메일과 비밀번호를 입력하세요.</p>

            <div th:if="${loginError}" class="alert alert-danger d-flex align-items-center py-2 px-3 mb-3" role="alert">
                <span class="small" th:text="${loginError}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold small">이메일</label>
                    <input type="email" id="email" name="email"
                           class="form-control"
                           th:classappend="${loginError != null and loginEmail == null} ? 'is-invalid' : ''"
                           th:value="${loginEmail}"
                           required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small">비밀번호</label>
                    <input type="password" id="password" name="password"
                           class="form-control"
                           th:classappend="${loginError != null} ? 'is-invalid' : ''"
                           required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold">로그인</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
