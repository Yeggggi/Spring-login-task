<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f9fafb;
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container" style="max-width: 440px;">
    <div class="card shadow-sm border-0 rounded-3 p-4 text-center">
        <div class="card-body">
            <div class="mb-3">
                <span class="fs-1">👋</span>
            </div>
            <h1 class="fs-4 fw-bold text-dark mb-2">환영합니다!</h1>

            <div th:if="${email}">
                <p class="text-muted small mb-1">현재 로그인된 계정</p>
                <p class="fw-semibold text-primary mb-4" th:text="${email}"></p>
                <a href="/logout" class="btn btn-outline-secondary btn-sm px-4">로그아웃</a>
            </div>

            <div th:if="${email == null}">
                <p class="text-muted small mb-4">아직 로그인하지 않았습니다.</p>
                <a href="/login" class="btn btn-primary btn-sm px-4">로그인 하러가기</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
